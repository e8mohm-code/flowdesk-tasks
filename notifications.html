<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>التنبيهات — Flowdesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <div id="sidebarSlot"></div>

  <main class="main">
    <div id="topbarSlot"></div>

    <section class="page-head">
      <div class="page-head-text">
        <h1 class="page-title">التنبيهات</h1>
        <p class="page-sub">كل التحديثات الأخيرة على فريقك ومهامك في مكان واحد.</p>
      </div>
      <div class="head-right">
        <button class="ghost-btn" id="markAllRead">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l4 4L13 8"/><path d="M9 12l4 4 8-10"/></svg>
          تحديد الكل كمقروء
        </button>
      </div>
    </section>

    <section class="kpi-row">
      <div class="kpi-chip warn"><span class="kpi-num" id="nUnread">0</span><span class="kpi-label">غير مقروءة</span></div>
      <div class="kpi-chip"><span class="kpi-num" id="nTotal">0</span><span class="kpi-label">إجمالي اليوم</span></div>
      <div class="kpi-chip alt"><span class="kpi-num" id="nOverdue">0</span><span class="kpi-label">تنبيهات تأخر</span></div>
      <div class="kpi-chip ok"><span class="kpi-num" id="nDone">0</span><span class="kpi-label">إنجازات</span></div>
    </section>

    <section class="hub">
      <div class="employees-area">
        <header class="area-head">
          <h2 class="area-title">السجل</h2>
          <div class="filter-chips" id="typeFilters">
            <button class="chip-btn active" data-type="all">الكل</button>
            <button class="chip-btn" data-type="overdue">تأخّر</button>
            <button class="chip-btn" data-type="completed">إنجاز</button>
            <button class="chip-btn" data-type="assigned">إسناد</button>
            <button class="chip-btn" data-type="comment">تعليق</button>
          </div>
        </header>
        <div id="notifList" class="notif-list"></div>
      </div>

      <aside class="unassigned-panel">
        <header class="panel-head">
          <div>
            <h2 class="area-title">تذكيرات هامّة</h2>
            <p class="area-sub">مهام تحتاج انتباهاً عاجلاً</p>
          </div>
          <span class="count-pill" id="urgentCount">0</span>
        </header>
        <div id="urgentList" class="cal-agenda"></div>
      </aside>
    </section>

  </main>
</div>

<div id="toast" class="toast"></div>

<script src="data.js"></script>
<script src="layout.js"></script>
<script src="task-modal.js"></script>
<script src="notifications.js"></script>
</body>
</html>
