<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تطبيقي — Flowdesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="phone-body">

<div class="phone-shell">

  <header class="phone-head" id="phoneHead">
    <!-- rendered by JS -->
  </header>

  <main class="phone-main" id="phoneMain">
    <!-- rendered by JS -->
  </main>

  <nav class="phone-nav" id="phoneNav">
    <button type="button" class="ph-tab active" data-tab="tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M8 10l3 3 5-6"/></svg>
      <span>مهامي</span>
    </button>
    <button type="button" class="ph-tab" data-tab="watching">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span>متابعتي</span>
    </button>
    <button type="button" class="ph-tab" data-tab="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>ملفي</span>
    </button>
    <button type="button" class="ph-tab" data-tab="checklist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>الشك ليست</span>
    </button>
    <button type="button" class="ph-tab" data-tab="alerts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M14 21a2 2 0 01-4 0"/></svg>
      <span>التنبيهات</span>
    </button>
  </nav>

</div>

<div id="toast" class="toast"></div>

<script src="data.js"></script>
<script src="task-detail-modal.js"></script>
<script src="checklist-instance-modal.js"></script>
<script src="my-tasks.js"></script>
</body>
</html>
